apiVersion: v1
kind: ConfigMap
metadata:
  name: open5gs-amf-config
  namespace: telecom
data:
  amf.yaml: |
    logger:
      file:
        path: /dev/stdout

    global:
      max:
        ue: 1024

    amf:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
        client:
          nrf:
            - uri: http://open5gs-nrf.telecom.svc.cluster.local:7777

      ngap:
        server:
          - address: 0.0.0.0
            port: 38412

      guami:
        - plmn_id:
            mcc: 001
            mnc: 01
          amf_id:
            region: 2
            set: 1
            pointer: 1

      tai:
        - plmn_id:
            mcc: 001
            mnc: 01
          tac: 1

      plmn_support:
        - plmn_id:
            mcc: 001
            mnc: 01
          s_nssai:
            - sst: 1

      security:
        integrity_order : [ NIA2, NIA1, NIA0 ]
        ciphering_order : [ NEA0, NEA1, NEA2 ]

      network_name:
        full: Open5GS
        short: Next

      amf_name: open5gs-amf

      time:
        t3502:
          value: 720
        t3512:
          value: 540

    nrf:
      sbi:
        server:
          - address: open5gs-nrf.telecom.svc.cluster.local
            port: 7777
