apiVersion: v1
kind: ConfigMap
metadata:
  name: open5gs-nrf-config
  namespace: telecom
data:
  nrf.yaml: |
    logger:
      file:
        path: /dev/stdout

    global:
      max:
        ue: 1024

    nrf:
      serving:
        - plmn_id:
            mcc: 999
            mnc: 70

      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
