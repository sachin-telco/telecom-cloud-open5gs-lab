apiVersion: v1
kind: ConfigMap
metadata:
  name: open5gs-scp-config
  namespace: telecom
data:
  scp.yaml: |
    logger:
      file:
        path: /dev/stdout

    global:
      max:
        ue: 1024

    scp:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
        client:
          nrf:
            - uri: http://open5gs-nrf.telecom.svc.cluster.local:7777
